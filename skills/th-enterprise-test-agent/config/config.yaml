# 企业级测试Agent配置

# 测试严格程度
# basic: 基础测试（适合内部使用）
# enterprise: 企业级（商业化发布标准）
# strict: 最严格（金融/医疗级）
strictness: enterprise

# Web应用配置
web:
  baseUrl: http://localhost:3000
  timeout: 30000
  browsers:
    - chrome
    - firefox
    - safari
  devices:
    - desktop
    - tablet
    - mobile
  viewports:
    desktop: "1920x1080"
    tablet: "768x1024"
    mobile: "375x667"

# API测试配置
api:
  baseUrl: http://localhost:8080
  timeout: 10000
  concurrent: 100
  endpoints:
    health: /health
    ready: /ready

# 性能测试配置
performance:
  duration: 10m
  vus: 100
  thresholds:
    http_req_duration:
      - p(95)<2000
    http_req_failed:
      - rate<0.001
    http_req_duration_avg:
      - avg<1000

# 安全测试配置
security:
  severity: high
  owasp: true
  dependencies: true
  secrets: true
  ignore:
    - CVE-2023-XXXX  # 示例：已知但不修复的漏洞

# 覆盖率配置
coverage:
  threshold: 90
  lines: 90
  functions: 90
  branches: 80
  statements: 90

# 代码质量配置
quality:
  max_complexity: 15
  max_lines_per_function: 50
  max_file_lines: 500

# 通知配置
notifications:
  slack:
    webhook: ""
    channel: "#releases"
  email:
    smtp: ""
    from: ""
    to: ""

# CI/CD配置
ci:
  fail_on_warning: false
  generate_html_report: true
  upload_artifacts: true
