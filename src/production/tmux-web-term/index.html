        // 初始化 FAB 拖拽
        function initFabDrag() {
            const fabContainer = document.querySelector('.fab-container');
            const fabExpand = document.getElementById('fabExpand');
            let isDragging = false;
            let startX, startY, initialX, initialY;
            let dragThreshold = 10;
            let hasMoved = false;

            // 触摸开始
            fabExpand.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                initialX = fabContainer.offsetLeft;
                initialY = fabContainer.offsetTop;
                isDragging = false;
                hasMoved = false;
                fabExpand.classList.add('dragging');
            }, { passive: true });

            // 触摸移动
            fabExpand.addEventListener('touchmove', function(e) {
                if (!hasMoved) return;
                const touch = e.touches[0];
                const deltaX = touch.clientX - startX;
                const deltaY = touch.clientY - startY;

                if (Math.abs(deltaX) > dragThreshold || Math.abs(deltaY) > dragThreshold) {
                    isDragging = true;
                }

                if (isDragging) {
                    e.preventDefault();
                    let newX = initialX + deltaX;
                    let newY = initialY + deltaY;

                    // 边界限制
                    const maxX = window.innerWidth - fabContainer.offsetWidth;
                    const maxY = window.innerHeight - fabContainer.offsetHeight;
                    newX = Math.max(0, Math.min(newX, maxX));
                    newY = Math.max(0, Math.min(newY, maxY));

                    fabContainer.style.left = newX + 'px';
                    fabContainer.style.top = newY + 'px';
                    fabContainer.style.right = 'auto';
                    fabContainer.style.bottom = 'auto';

                    fabPosition = { x: newX, y: newY };
                }
            }, { passive: false });

            // 触摸结束
            fabExpand.addEventListener('touchend', function(e) {
                fabExpand.classList.remove('dragging');
                if (isDragging) {
                    saveFabPosition();
                    showToast('位置已保存', 'success', 800);
                }
                isDragging = false;
                hasMoved = false;
            });

            // 鼠标拖拽（桌面端）
            fabExpand.addEventListener('mousedown', function(e) {
                startX = e.clientX;
                startY = e.clientY;
                initialX = fabContainer.offsetLeft;
                initialY = fabContainer.offsetTop;
                isDragging = false;
                hasMoved = true;
                fabExpand.classList.add('dragging');

                function onMouseMove(e) {
                    const deltaX = e.clientX - startX;
                    const deltaY = e.clientY - startY;

                    if (Math.abs(deltaX) > dragThreshold || Math.abs(deltaY) > dragThreshold) {
                        isDragging = true;
                    }

                    if (isDragging) {
                        let newX = initialX + deltaX;
                        let newY = initialY + deltaY;

                        const maxX = window.innerWidth - fabContainer.offsetWidth;
                        const maxY = window.innerHeight - fabContainer.offsetHeight;
                        newX = Math.max(0, Math.min(newX, maxX));
                        newY = Math.max(0, Math.min(newY, maxY));

                        fabContainer.style.left = newX + 'px';
                        fabContainer.style.top = newY + 'px';
                        fabContainer.style.right = 'auto';
                        fabContainer.style.bottom = 'auto';

                        fabPosition = { x: newX, y: newY };
                    }
                }

                function onMouseUp() {
                    fabExpand.classList.remove('dragging');
                    if (isDragging) {
                        saveFabPosition();
                        showToast('位置已保存', 'success', 800);
                    }
                    isDragging = false;
                    hasMoved = false;
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        // ==================== 顶部工具栏展开 ====================
        let headerToolbarExpanded = false;
        let toolbarCloseTimer = null;

        function toggleHeaderToolbar(e) {
            // 清除之前的关闭定时器
            if (toolbarCloseTimer) {
                clearTimeout(toolbarCloseTimer);
                toolbarCloseTimer = null;
            }

            headerToolbarExpanded = !headerToolbarExpanded;
            const toolbar = document.getElementById('headerToolbar');
            const btn = document.getElementById('headerExpandBtn');

            if (headerToolbarExpanded) {
                toolbar.classList.add('expanded');
                btn.classList.add('expanded');
            } else {
                toolbar.classList.remove('expanded');
                btn.classList.remove('expanded');
            }
        }

        // 点击外部关闭工具栏 - 使用延迟防止立即关闭
        document.addEventListener('click', function(e) {
            const toolbar = document.getElementById('headerToolbar');
            const btn = document.getElementById('headerExpandBtn');

            if (!toolbar || !btn) return;

            // 如果点击的是工具栏或按钮，不处理
            if (toolbar.contains(e.target) || btn.contains(e.target)) {
                return;
            }

            // 延迟关闭，避免和展开操作冲突
            if (headerToolbarExpanded) {
                toolbarCloseTimer = setTimeout(() => {
                    headerToolbarExpanded = false;
                    toolbar.classList.remove('expanded');
                    btn.classList.remove('expanded');
                }, 100);
            }
        });

        // ==================== 手势帮助 ====================
        function showGestureHelp() {
            const helpText = `
手势操作说明：

📱 单指操作：
• 短距离滑动 - 滚动终端内容
• 长距离快速滑动 - 进入复制模式
• 长按 - 选择文本

📋 复制模式：
• 单指滑动 - 滚动查看历史
• 双指下滑 - 退出复制模式
• 点击 - 选择文本起点

⌨️ 快捷操作：
• 悬浮按钮 - 可拖拽移动位置
• 点击展开 - 展开更多按键
• 🔤 按钮 - 切换系统键盘
            `;
            alert(helpText);
        }

        // ==================== 主题切换 ====================
        let currentTheme = 'dark';
        function toggleTheme() {
            // 暂不支持主题切换，预留接口
            showToast('主题切换功能开发中', 'info', 1000);
        }

        // ==================== 移动端手势支持（增强版） ====================
        let isCopyMode = false;

        (function initTouchGestures() {
            const terminalContainer = document.getElementById('terminal-container');
            const gestureHint = document.getElementById('gestureHint');
            const copyModeIndicator = document.getElementById('copyModeIndicator');
            let touchStartY = 0;
            let touchStartTime = 0;
            let isTouching = false;
            let isScrolling = false;
            let lastTapTime = 0;

            function showHint(text, duration = 1500) {
                gestureHint.textContent = text;
                gestureHint.classList.add('visible');
                setTimeout(() => {
                    gestureHint.classList.remove('visible');
                }, duration);
            }

            function updateCopyModeIndicator(show) {
                if (show) {
                    copyModeIndicator.classList.add('visible');
                    isCopyMode = true;
                } else {
                    copyModeIndicator.classList.remove('visible');
                    isCopyMode = false;
                }
            }

            // 进入复制模式
            function enterCopyMode() {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'input', data: '\x02[' }));
                    updateCopyModeIndicator(true);
                    showHint('已进入复制模式 (↑↓滑动滚动, 双指退出)', 2000);
                }
            }

            // 退出复制模式
            function exitCopyMode() {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'input', data: 'q' }));
                    updateCopyModeIndicator(false);
                    showHint('已退出复制模式', 1000);
                }
            }

            // 发送 tmux 滚动命令
            function sendTmuxScroll(direction) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    // 向上滚动（查看历史）发送 PageUp
                    if (direction === 'up') {
                        ws.send(JSON.stringify({ type: 'input', data: '\x1b[5~' })); // PageUp
                    } else {
                        ws.send(JSON.stringify({ type: 'input', data: '\x1b[6~' })); // PageDown
                    }
                }
            }

            // 发送 tmux 行滚动
            function sendTmuxLineScroll(direction) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    if (direction === 'up') {
                        ws.send(JSON.stringify({ type: 'input', data: '\x1b[A' })); // 上箭头
                    } else {
                        ws.send(JSON.stringify({ type: 'input', data: '\x1b[B' })); // 下箭头
                    }
                }
            }

            terminalContainer.addEventListener('touchstart', function(e) {
                touchStartY = e.touches[0].clientY;
                touchStartTime = Date.now();
                isTouching = true;
                isScrolling = false;

                // 检测双击进入复制模式
                const now = Date.now();
                if (now - lastTapTime < 300) {
                    enterCopyMode();
                }
                lastTapTime = now;
            }, { passive: true });

            terminalContainer.addEventListener('touchmove', function(e) {
                if (!isTouching) return;
                const touchY = e.touches[0].clientY;
                const deltaY = touchStartY - touchY;

                // 复制模式下的滚动处理
                if (isCopyMode) {
                    e.preventDefault(); // 阻止默认滚动行为

                    if (Math.abs(deltaY) > 30 && !isScrolling) {
                        isScrolling = true;
                        if (deltaY > 0) {
                            // 向上滑动 - 查看更早的历史
                            sendTmuxScroll('up');
                        } else {
                            // 向下滑动 - 查看更新的内容
                            sendTmuxScroll('down');
                        }
                        // 重置起始位置，实现连续滚动
                        touchStartY = touchY;
                    }
                    return;
                }

                // 正常模式下的滚动
                if (Math.abs(deltaY) > 30 && !isScrolling) {
                    isScrolling = true;
                    if (deltaY > 0) {
                        // 向上滑动
                        term.scrollLines(-5);
                    } else {
                        // 向下滑动
                        term.scrollLines(5);
                    }
                    touchStartY = touchY;
                }
            }, { passive: false });

            terminalContainer.addEventListener('touchend', function(e) {
                if (!isTouching) return;
                isTouching = false;

                const touchEndY = e.changedTouches[0].clientY;
                const deltaY = touchStartY - touchEndY;
                const deltaTime = Date.now() - touchStartTime;

                // 复制模式下的退出检测
                if (isCopyMode) {
                    // 快速向下滑动退出复制模式
                    if (deltaY < -100 && deltaTime < 500) {
                        exitCopyMode();
                    }
                    isScrolling = false;
                    return;
                }

                // 正常模式下进入复制模式（长距离快速向上滑动）
                if (deltaY > 100 && deltaTime < 500 && !isScrolling) {
                    enterCopyMode();
                }

                isScrolling = false;
            }, { passive: true });

            // 双指下滑退出复制模式
            terminalContainer.addEventListener('touchstart', function(e) {
                if (e.touches.length === 2 && isCopyMode) {
                    exitCopyMode();
                }
            }, { passive: true });

            // 监听键盘事件检测退出复制模式
            document.addEventListener('keydown', function(e) {
                if (isCopyMode && e.key === 'q') {
                    updateCopyModeIndicator(false);
                }
            });

            console.log('[Touch] 手势支持已初始化（增强版）');
        })();

        // 初始化 FAB 位置和拖拽
        loadFabPosition();
        initFabDrag();

        // 初始化多会话工作区系统
        initWorkspaceSystem();

        // ==================== Tab 页面预加载 ====================
        // 存储会话状态到 localStorage，方便新标签页快速恢复
        window.addEventListener('beforeunload', function() {
            const sessionName = document.getElementById('sessionIndicator').textContent;
            if (sessionName && sessionName !== '独立终端') {
                localStorage.setItem('tmux_last_session', sessionName);
            }
        });
    </script>
