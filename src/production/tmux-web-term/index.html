<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0c0c0c">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="manifest" href="/manifest.json">
    <title>tmux-web-term 移动端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0c0c0c;
            color: #ccc;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        
        /* 顶部状态栏 - 现代化 */
        .header {
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.98) 0%, rgba(22, 33, 62, 0.98) 100%);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(74, 222, 128, 0.2);
            flex-shrink: 0;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header h1 {
            font-size: 16px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .status-meta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            min-width: 0;
            overflow: hidden;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            color: #cfcfcf;
        }

        /* 顶部工具栏展开区域 - 重新设计 */
        .header-toolbar {
            position: absolute;
            top: 100%;
            left: 10px;
            right: 10px;
            background: linear-gradient(145deg, rgba(30, 30, 45, 0.98), rgba(20, 20, 35, 0.98));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(74, 222, 128, 0.15);
            border-radius: 0 0 16px 16px;
            padding: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(74, 222, 128, 0.1);
            max-height: 0;
            overflow: hidden;
        }

        .header-toolbar.expanded {
            transform: translateY(10px);
            opacity: 1;
            pointer-events: auto;
            max-height: 200px;
        }

        .toolbar-btn {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), rgba(74, 222, 128, 0.05));
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 100px;
            justify-content: center;
        }

        .toolbar-btn:hover {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(74, 222, 128, 0.1));
            border-color: rgba(74, 222, 128, 0.4);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(74, 222, 128, 0.2);
        }

        .toolbar-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .toolbar-btn.active {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.3), rgba(74, 222, 128, 0.2));
            border-color: #4ade80;
            color: #fff;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }

        .header-expand-btn {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: #4ade80;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-expand-btn:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.4);
            transform: translateY(-1px);
        }

        .header-expand-btn.expanded {
            transform: rotate(180deg);
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        /* 拖拽时的 FAB 样式 */
        .fab-expand.dragging {
            opacity: 0.8;
            transform: scale(1.1);
            cursor: grabbing;
            transition: none;
        }

        /* 复制模式指示器 */
        .copy-mode-indicator {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, rgba(251, 191, 36, 0.98) 0%, rgba(217, 119, 6, 0.98) 100%);
            color: #000;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow:
                0 8px 32px rgba(251, 191, 36, 0.5),
                0 4px 16px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(251, 191, 36, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .copy-mode-indicator.visible {
            display: flex;
        }

        /* 手势提示增强 */
        .gesture-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(74, 222, 128, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .gesture-hint.visible {
            opacity: 1;
        }

        /* 现代化滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(74, 222, 128, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 222, 128, 0.5);
        }

        /* 动画定义 */
        @keyframes slideDown {
            from {
                transform: translate(-50%, -20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 玻璃拟态效果增强 */
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #sessionIndicator {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 1;
        }

        @media (max-width: 480px) {
            #sessionIndicator {
                max-width: 80px;
            }

            .keys-row-tmux {
                display: flex;
            }
        }

        /* ========== 主布局 ========== */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            height: 100%;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #0c0c0c;
        }

        /* ========== 左侧边栏 ========== */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, rgba(22, 22, 32, 0.98) 0%, rgba(18, 18, 28, 0.98) 100%);
            border-right: 1px solid rgba(74, 222, 128, 0.15);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
            width: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(74, 222, 128, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #888;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .sidebar-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .session-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            position: relative;
        }

        .session-item:hover {
            background: rgba(74, 222, 128, 0.08);
            border-color: rgba(74, 222, 128, 0.2);
        }

        .session-item.active {
            background: linear-gradient(145deg, rgba(74, 222, 128, 0.15) 0%, rgba(34, 197, 94, 0.1) 100%);
            border-color: rgba(74, 222, 128, 0.4);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.15);
        }

        .session-item-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .session-item-status.online {
            background: linear-gradient(145deg, #4ade80 0%, #22c55e 100%);
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
        }

        .session-item-status.offline {
            background: rgba(100, 100, 100, 0.8);
        }

        .session-item-status.connecting {
            background: linear-gradient(145deg, #f59e0b 0%, #d97706 100%);
            animation: pulse-glow 1.5s infinite;
        }

        .session-item-info {
            flex: 1;
            min-width: 0;
        }

        .session-item-name {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-item-meta {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .session-item-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .session-item:hover .session-item-actions {
            opacity: 1;
        }

        .session-item-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #888;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .session-item-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid rgba(74, 222, 128, 0.1);
        }

        .new-session-btn {
            width: 100%;
            background: linear-gradient(145deg, rgba(74, 222, 128, 0.95) 0%, rgba(34, 197, 94, 0.95) 100%);
            border: 2px solid rgba(74, 222, 128, 0.5);
            border-radius: 12px;
            padding: 12px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
        }

        .new-session-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.4);
        }

        .new-session-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 侧边栏切换按钮 */
        .sidebar-toggle {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: #4ade80;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
            margin-right: 8px;
        }

        .sidebar-toggle:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.4);
        }

        /* ========== 底部固定操作栏 ========== */
        .bottom-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 12px;
            background: linear-gradient(180deg, rgba(26, 26, 30, 0.98) 0%, rgba(20, 20, 24, 0.98) 100%);
            border-top: 1px solid rgba(74, 222, 128, 0.15);
            gap: 8px;
        }

        .bottom-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 12px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            max-width: 80px;
        }

        .bottom-btn span {
            font-size: 20px;
        }

        .bottom-btn label {
            font-size: 11px;
            font-weight: 500;
        }

        .bottom-btn:hover {
            background: rgba(74, 222, 128, 0.08);
            color: #a0a0a0;
        }

        .bottom-btn.active {
            background: linear-gradient(145deg, rgba(74, 222, 128, 0.15) 0%, rgba(34, 197, 94, 0.1) 100%);
            border-color: rgba(74, 222, 128, 0.3);
            color: #4ade80;
        }

        /* ========== 快照视图 ========== */
        .snapshot-view {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(15, 15, 20, 0.98) 0%, rgba(12, 12, 16, 0.98) 100%);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .snapshot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(74, 222, 128, 0.15);
        }

        .snapshot-title {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .snapshot-time {
            font-size: 13px;
            color: #666;
        }

        .snapshot-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .snapshot-terminal {
            background: linear-gradient(145deg, rgba(30, 30, 35, 0.98) 0%, rgba(25, 25, 30, 0.98) 100%);
            border: 1px solid rgba(74, 222, 128, 0.15);
            border-radius: 16px;
            padding: 20px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
            overflow: auto;
            min-height: 200px;
            max-height: 60%;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .snapshot-terminal pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .snapshot-actions {
            display: flex;
            gap: 12px;
            padding-top: 15px;
        }

        .snapshot-btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .snapshot-btn.reconnect {
            background: linear-gradient(145deg, rgba(74, 222, 128, 0.95) 0%, rgba(34, 197, 94, 0.95) 100%);
            border-color: rgba(74, 222, 128, 0.5);
            color: #000;
            box-shadow: 0 4px 16px rgba(74, 222, 128, 0.3);
        }

        .snapshot-btn.reconnect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(74, 222, 128, 0.4);
        }

        .snapshot-btn.delete {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.1) 0%, rgba(220, 38, 38, 0.1) 100%);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .snapshot-btn.delete:hover {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.2) 0%, rgba(220, 38, 38, 0.15) 100%);
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 200;
                box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
                width: 260px;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 150;
            }

            .sidebar-overlay.visible {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .bottom-btn label {
                display: none;
            }

            .bottom-btn {
                padding: 10px;
            }

            .snapshot-actions {
                flex-direction: column;
            }
        }

        /* ========== 移除旧的FAB样式 ========== */
        .fab-container,
        .fab-expand,
        .kb-legend-btn {
            display: none !important;
        }

        /* ========== 移除顶部工具栏 ========== */
        .header-toolbar,
        .header-expand-btn {
            display: none !important;
        }
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .gesture-hint.visible {
            opacity: 1;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(100, 100, 100, 0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0);
        }

        .status-dot.connected {
            background: linear-gradient(145deg, #4ade80 0%, #22c55e 100%);
            box-shadow:
                0 0 12px rgba(74, 222, 128, 0.8),
                0 0 20px rgba(74, 222, 128, 0.4);
            animation: pulse-glow 2s infinite;
        }

        .status-dot.recording {
            background: linear-gradient(145deg, #ef4444 0%, #dc2626 100%);
            box-shadow:
                0 0 12px rgba(239, 68, 68, 0.8),
                0 0 20px rgba(239, 68, 68, 0.4);
            animation: recording-pulse 1.5s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow:
                    0 0 12px rgba(74, 222, 128, 0.8),
                    0 0 20px rgba(74, 222, 128, 0.4);
            }
            50% {
                box-shadow:
                    0 0 16px rgba(74, 222, 128, 1),
                    0 0 28px rgba(74, 222, 128, 0.6);
            }
        }

        @keyframes recording-pulse {
            0%, 100% {
                box-shadow:
                    0 0 12px rgba(239, 68, 68, 0.8),
                    0 0 20px rgba(239, 68, 68, 0.4);
            }
            50% {
                box-shadow:
                    0 0 16px rgba(239, 68, 68, 1),
                    0 0 28px rgba(239, 68, 68, 0.6);
            }
        }

        #sessionSelect {
            outline: none;
            max-width: 120px;
        }

        #sessionSelect:hover {
            border-color: #4ade80;
        }

        /* 会话列表按钮 */
        .session-btn {
            background: linear-gradient(145deg, rgba(42, 42, 53, 0.95) 0%, rgba(37, 37, 46, 0.95) 100%);

        /* 悬浮扩展按钮 (FAB) */
        /* FAB 按钮 - 现代化设计 */
        .fab-expand {
            position: fixed;
            right: 16px;
            bottom: 160px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(74, 222, 128, 0.95) 0%, rgba(34, 197, 94, 0.95) 100%);

            transform: scale(1.1);

            transition: none;
            box-shadow:
                0 16px 48px rgba(74, 222, 128, 0.5),

        .connect-overlay {
            position: absolute;

            left: 0;

            display: none;
        }

        /* Toast 提示 */
        .toast {
            background: linear-gradient(145deg, rgba(30, 30, 45, 0.98) 0%, rgba(25, 25, 35, 0.98) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.6),
                0 4px 12px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 100%;
            min-width: 200px;
        }

        .toast.toast-hidden {
            animation: slideUp 0.3s ease forwards;
        }

        .toast-success { border-left: 4px solid #4ade80; background: linear-gradient(145deg, rgba(74, 222, 128, 0.15), rgba(25, 35, 30, 0.98)); }
        .toast-error { border-left: 4px solid #ef4444; background: linear-gradient(145deg, rgba(239, 68, 68, 0.15), rgba(35, 25, 25, 0.98)); }
        .toast-warning { border-left: 4px solid #f59e0b; background: linear-gradient(145deg, rgba(245, 158, 11, 0.15), rgba(35, 32, 25, 0.98)); }
        .toast-info { border-left: 4px solid #3b82f6; background: linear-gradient(145deg, rgba(59, 130, 246, 0.15), rgba(25, 28, 35, 0.98)); }

        .toast-icon {
            font-size: 18px;
            flex-shrink: 0;

            flex: 1;
            color: #e0e0e0;
            font-size: 13px;
            line-height: 1.4;

        .toast-close {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
            flex-shrink: 0;
        }

        .toast-close:hover { color: #fff; }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }

    <!-- 主布局容器 -->

        <!-- 左侧边栏 - 标签页列表 -->

            <!-- 主内容显示区 -->
            <div class="main-content" id="mainContent">

                <!-- 状态3: 会话选择器 (PRD F-003) -->
                <div class="session-selector" id="sessionSelector" style="display:none;">
                    <div class="selector-header">
                        <h2>选择或创建 tmux 会话</h2>
                        <p>当前标签页: <span id="selectorTabName">--</span></p>
                    </div>

                    <div class="selector-content">
                        <div class="selector-section">
                            <h3>可用会话</h3>
                            <div class="available-sessions" id="availableSessions">
                                <!-- 会话列表将动态插入 -->
                                <div class="empty-sessions">暂无可用会话</div>

                        <div class="selector-section create-section">

                            <div class="create-session-form">

                                <button class="snapshot-btn create" onclick="createTmuxSession()">
                                    <span>+</span> 创建并连接

                            </div>

                    <div class="selector-actions">

            <!-- 底部固定操作栏 -->
            <div class="bottom-bar" id="bottomBar">

            <!-- 虚拟键盘区域 -->
            <div class="keyboard-area" id="keyboard">
                <!-- 输入框行 -->
                <div class="input-row">
                    <input type="text" id="commandInput" placeholder="输入命令（点击 🔤 打开系统键盘）..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="none" readonly>
                    <button class="send-btn" id="sendBtn">发送</button>
                </div>

                <!-- 第一排：Ctrl 键 + tmux 前缀 -->
                <div class="keys-row">
                    <button onclick="sendKey('\x03')" class="control">Ctrl+C</button>

                    <button onclick="sendKey('\t')">Tab</button>

                    <button onclick="sendInput('clear\n')" class="app">clear</button>

                <!-- 第二排：方向键 -->
                <div class="keys-row keys-row-secondary">

                    <button onclick="sendKey('\x02s')" class="tmux-prefix" title="切换会话">Ctrl+B S</button>
                    <button onclick="sendKey('\x02%')" class="tmux-prefix" title="垂直分屏">垂直分屏</button>
                    <button onclick="sendKey('\x02\x22')" class="tmux-prefix" title="水平分屏">水平分屏</button>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.51.0/lib/xterm-addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/zmodem.js@0.1.10/dist/zmodem.min.js"></script>
    <script>
        // ==================== 终端初始化 ====================
        const term = new Terminal({
            cursorBlink: true,
            fontSize: window.innerWidth < 480 ? 12 : 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            theme: {
                background: '#0c0c0c',
                foreground: '#cccccc',
                cursor: '#4ade80',
                cursorAccent: '#000',
                selection: 'rgba(74, 222, 128, 0.3)',
                black: '#0c0c0c',
                red: '#ff5555',
                green: '#4ade80',
                yellow: '#f1fa8c',
                blue: '#69a5f7',
                magenta: '#bd93f9',
                cyan: '#8be9fd',
                white: '#cccccc',
                brightBlack: '#666666',
                brightRed: '#ff6e6e',
                brightGreen: '#6eff6e',
                brightYellow: '#ffff6e',
                brightBlue: '#6effff',
                brightMagenta: '#ff6eff',
                brightCyan: '#6effff',
                brightWhite: '#ffffff'
            },
            convertEol: true,
            scrollback: 10000,
            tabStopWidth: 4,
            allowProposedApi: true
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        
        // 初始适配
        setTimeout(() => fitAddon.fit(), 100);
        
        // ==================== WebSocket 连接管理 ====================
        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 15;
        const DEFAULT_SESSION = 'ws1';
        let isConnecting = false;
        let heartbeatInterval = null;
        const HEARTBEAT_INTERVAL = 30000; // 30 秒心跳

        // 指数退避配置
        const INITIAL_RECONNECT_DELAY = 1000;  // 初始延迟 1 秒
        const MAX_RECONNECT_DELAY = 30000;     // 最大延迟 30 秒
        const RECONNECT_BACKOFF_MULTIPLIER = 2; // 退避倍率

        // ==================== 多标签页工作区管理 ====================
        // PRD F-001: 标签页与会话概念分离
        // 标签页状态: 'empty' | 'connecting' | 'connected' | 'disconnected'
        let tabs = [];              // 标签页列表（浏览器端工作空间）
        let currentTab = null;      // 当前活动标签页
        let tmuxSessions = [];      // 服务器端tmux会话列表
        let sidebarVisible = false;
        let terminalBuffer = [];    // 存储终端输出行用于快照
        const MAX_SNAPSHOT_LINES = 50;
        const TABS_STORAGE_KEY = 'tmux_tabs_v3';
        const TMUX_SESSIONS_STORAGE_KEY = 'tmux_sessions_list_v3';
        const LEGACY_SESSIONS_KEY = 'tmux_sessions_v2';

        // 初始化多标签页系统
        function initWorkspaceSystem() {
            // PRD F-006: 首先尝试数据迁移
            migrateLegacyData();

            loadTabsFromStorage();

            // 如果没有标签页，创建一个默认标签页
            if (tabs.length === 0) {
                const defaultTab = {
                    id: generateTabId(),
                    name: '标签页 1',
                    sessionName: DEFAULT_SESSION,
                    status: 'disconnected',
                    snapshot: '',
                    terminalBuffer: [],
                    createdAt: Date.now(),
                    lastActivity: Date.now()
                };
                tabs.push(defaultTab);
                currentTab = defaultTab;
                saveTabsToStorage();
            }

            renderTabList();
            updateTabUI();

            // 初始化终端缓冲区捕获
            initTerminalBufferCapture();
        }

        // PRD F-006: 数据迁移 - 从v2格式迁移到v3格式
        function migrateLegacyData() {
            try {
                const legacyData = localStorage.getItem(LEGACY_SESSIONS_KEY);
                if (!legacyData) return;

                const legacySessions = JSON.parse(legacyData);
                if (!Array.isArray(legacySessions) || legacySessions.length === 0) return;

                console.log('[Migration] 发现v2数据，开始迁移...');

                // 将旧session数据转换为新的tab格式
                const migratedTabs = legacySessions.map((s, index) => ({
                    id: s.id || generateTabId(),
                    name: `标签页 ${index + 1}`,
                    sessionName: s.name || DEFAULT_SESSION,
                    status: s.status === 'online' ? 'connected' : 'disconnected',
                    snapshot: s.snapshot || '',
                    terminalBuffer: s.terminalBuffer || [],
                    createdAt: s.lastConnected || Date.now(),
                    lastActivity: s.lastActivity || Date.now()
                }));

                // 提取唯一的tmux会话列表
                const uniqueSessionNames = [...new Set(legacySessions.map(s => s.name).filter(Boolean))];
                const migratedSessions = uniqueSessionNames.map(name => ({
                    name: name,
                    isActive: true,
                    attachedClients: 0,
                    lastActivity: Date.now()
                }));

                // 保存到新存储
                localStorage.setItem(TABS_STORAGE_KEY, JSON.stringify(migratedTabs));
                localStorage.setItem(TMUX_SESSIONS_STORAGE_KEY, JSON.stringify(migratedSessions));

                // 删除旧数据
                localStorage.removeItem(LEGACY_SESSIONS_KEY);

                console.log('[Migration] 迁移完成:', migratedTabs.length, '个标签页,', migratedSessions.length, '个会话');
            } catch (e) {
                console.error('[Migration] 数据迁移失败:', e);
            }
        }

        // 生成唯一标签页ID
        function generateTabId() {
            return 'tab_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // 从localStorage加载标签页
        function loadTabsFromStorage() {
            try {
                const stored = localStorage.getItem(TABS_STORAGE_KEY);
                if (stored) {
                    tabs = JSON.parse(stored);
                    // 找到最后活跃的标签页作为当前标签页
                    const lastActive = tabs.find(t => t.lastActivity);
                    if (lastActive) {
                        currentTab = lastActive;
                    } else if (tabs.length > 0) {
                        currentTab = tabs[0];
                    }
                }

                // 加载tmux会话列表
                const sessionsStored = localStorage.getItem(TMUX_SESSIONS_STORAGE_KEY);
                if (sessionsStored) {
                    tmuxSessions = JSON.parse(sessionsStored);
                }
            } catch (e) {
                console.error('[Workspace] 加载标签页失败:', e);
                tabs = [];
                tmuxSessions = [];
            }
        }

        // 保存标签页到localStorage
        function saveTabsToStorage() {
            try {
                localStorage.setItem(TABS_STORAGE_KEY, JSON.stringify(tabs));
                localStorage.setItem(TMUX_SESSIONS_STORAGE_KEY, JSON.stringify(tmuxSessions));
            } catch (e) {
                console.error('[Workspace] 保存标签页失败:', e);
            }
        }

        // 初始化终端缓冲区捕获
        function initTerminalBufferCapture() {
            // 注意：终端输出缓冲区在WebSocket onmessage中捕获
            // 这里不需要额外监听，因为WebSocket数据直接写入终端
            console.log('[Workspace] 终端缓冲区捕获已初始化');
        }

        // 处理终端输出并添加到缓冲区（保存到当前标签页的缓冲区）
        function processTerminalOutput(data) {
            if (!currentTab || !data) return;

            // 将数据转换为字符串
            let text = '';
            if (data instanceof ArrayBuffer) {
                text = new TextDecoder().decode(data);
            } else if (typeof data === 'string') {
                text = data;
            }

            // 将数据添加到当前标签页的缓冲区
            if (!currentTab.terminalBuffer) {
                currentTab.terminalBuffer = [];
            }

            const lines = text.split('\n');
            lines.forEach(line => {
                if (line.trim()) {
                    currentTab.terminalBuffer.push(line);
                }
            });

            // 保持缓冲区大小
            if (currentTab.terminalBuffer.length > MAX_SNAPSHOT_LINES) {
                currentTab.terminalBuffer = currentTab.terminalBuffer.slice(-MAX_SNAPSHOT_LINES);
            }
        }

        // 捕获当前终端快照
        function captureSnapshot() {
            if (!currentTab) return;

            // 从标签页的缓冲区生成快照
            const buffer = currentTab.terminalBuffer || [];
            if (buffer.length === 0) return;

            currentTab.snapshot = buffer.join('\n');
            currentTab.lastActivity = Date.now();
            saveTabsToStorage();

            console.log('[Workspace] 快照已捕获:', currentTab.name);
        }

        // 加载标签页的缓冲区（切换标签页时调用）
        function loadTabBuffer(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (tab) {
                // 初始化标签页的缓冲区（如果不存在）
                if (!tab.terminalBuffer) {
                    tab.terminalBuffer = [];
                }
                // 如果有快照，加载到缓冲区
                if (tab.snapshot) {
                    tab.terminalBuffer = tab.snapshot.split('\n').slice(-MAX_SNAPSHOT_LINES);
                }
            }
        }

        // 切换侧边栏显示
        function toggleSidebar() {
            sidebarVisible = !sidebarVisible;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            if (sidebar) {
                sidebar.classList.toggle('collapsed', !sidebarVisible);
            }
            if (overlay) {
                overlay.classList.toggle('visible', sidebarVisible);
            }

            // 重新渲染标签页列表
            if (sidebarVisible) {
                renderTabList();
            }
        }

        // 渲染标签页列表到侧边栏
        function renderTabList() {
            const container = document.getElementById('sessionListContainer');
            if (!container) return;

            container.innerHTML = '';

            if (tabs.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:#888;font-size:13px;">暂无标签页<br>点击"新建标签页"创建</div>';
                return;
            }

            tabs.forEach(tab => {
                const item = document.createElement('div');
                item.className = 'session-item' + (tab.id === currentTab?.id ? ' active' : '');
                item.onclick = () => selectTab(tab.id);

                // 状态指示器
                let statusClass = 'offline';
                let statusText = '未连接';
                if (tab.status === 'connected') {
                    statusClass = 'online';
                    statusText = '已连接';
                } else if (tab.status === 'connecting') {
                    statusClass = 'connecting';
                    statusText = '连接中';
                } else if (tab.status === 'empty') {
                    statusClass = 'offline';
                    statusText = '未关联';
                }

                // 最后活动时间
                let timeText = '';
                if (tab.lastActivity) {
                    const diff = Date.now() - tab.lastActivity;
                    if (diff < 60000) {
                        timeText = '刚刚';
                    } else if (diff < 3600000) {
                        timeText = Math.floor(diff / 60000) + '分钟前';
                    } else {
                        timeText = Math.floor(diff / 3600000) + '小时前';
                    }
                }

                // 显示关联的tmux会话名
                const sessionInfo = tab.sessionName ? `(${tab.sessionName})` : '';

                item.innerHTML = `
                    <div class="session-item-icon">${tab.status === 'connected' ? '▶' : '○'}</div>
                    <div class="session-item-info">
                        <div class="session-item-name">${escapeHtml(tab.name)} ${sessionInfo}</div>
                        <div class="session-item-meta">
                            <span class="session-item-status ${statusClass}">${statusText}</span>
                            ${timeText ? `<span class="session-item-time">${timeText}</span>` : ''}
                        </div>
                    </div>
                `;

                container.appendChild(item);
            });
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 选择标签页（点击侧边栏项）
        function selectTab(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab || tab.id === currentTab?.id) return;

            // 先捕获当前标签页的快照
            if (currentTab && currentTab.status === 'connected') {
                captureSnapshot();
                currentTab.status = 'disconnected';
            }

            currentTab = tab;
            saveTabsToStorage();

            // 加载新标签页的缓冲区
            loadTabBuffer(tab.id);

            // 更新UI
            updateTabUI();
            renderTabList();

            // 根据标签页状态显示不同视图
            if (tab.status === 'connected' || tab.status === 'connecting') {
                showTerminalView();
            } else if (tab.status === 'empty' || tab.status === 'disconnected') {
                showSessionSelector();
            }

            // 如果是已连接状态，确保WebSocket连接到正确会话
            if (tab.status === 'connected' && ws?.readyState === WebSocket.OPEN && tab.sessionName) {
                try {
                    ws.send(JSON.stringify({ type: 'switch', session: tab.sessionName }));
                } catch (e) {
                    console.error('[Tab] 切换会话失败:', e);
                    // 尝试重新连接
                    reconnectAttempts = 0;
                    connect();
                }
            }
        }

        // 显示终端视图
        function showTerminalView() {
            const terminalView = document.getElementById('terminal');
            const snapshotView = document.getElementById('snapshotView');

            if (terminalView) terminalView.style.display = 'block';
            if (snapshotView) snapshotView.style.display = 'none';

            // 确保终端正确渲染
            setTimeout(() => {
                fitAddon.fit();
                term.focus();
            }, 100);
        }

        // 显示会话选择器界面
        function showSessionSelector() {
            const terminalView = document.getElementById('terminalView');
            const snapshotView = document.getElementById('snapshotView');
            const sessionSelector = document.getElementById('sessionSelector');

            if (terminalView) terminalView.style.display = 'none';
            if (snapshotView) snapshotView.style.display = 'none';
            if (sessionSelector) {
                sessionSelector.style.display = 'flex';
                updateSessionSelectorUI();
            }

            // 请求最新的会话列表
            refreshSessions();
        }

        // 更新会话选择器UI
        function updateSessionSelectorUI() {
            const selectorTabName = document.getElementById('selectorTabName');
            const availableSessions = document.getElementById('availableSessions');

            if (selectorTabName && currentTab) {
                selectorTabName.textContent = currentTab.name;
            }

            if (!availableSessions) return;

            // 使用 allSessions（服务器返回的会话列表）
            if (!allSessions || allSessions.length === 0) {
                availableSessions.innerHTML = '<div class="empty-sessions">暂无可用会话</div>';
                return;
            }

            availableSessions.innerHTML = '';
            allSessions.forEach(sessionName => {
                const option = document.createElement('div');
                option.className = 'session-option';
                option.onclick = () => selectSessionForTab(sessionName);

                // 检查是否已连接
                const isConnected = currentTab && currentTab.sessionName === sessionName && currentTab.status === 'connected';

                option.innerHTML = `
                    <div class="session-option-info">
                        <span class="session-option-name">${escapeHtml(sessionName)}</span>
                        <span class="session-option-meta">点击选择此会话</span>
                    </div>
                    <div class="session-option-status ${isConnected ? 'online' : 'offline'}">
                        ${isConnected ? '● 已连接' : '○ 未连接'}
                    </div>
                `;
                availableSessions.appendChild(option);
            });
        }

        // 为当前标签页选择会话
        function selectSessionForTab(sessionName) {
            if (!currentTab) return;

            currentTab.sessionName = sessionName;
            currentTab.status = 'connecting';
            saveTabsToStorage();

            // 更新UI
            renderTabList();
            updateTabUI();

            // 尝试连接
            connectTabSession();
        }

        // 创建新的 tmux 会话 (PRD F-004)
        function createTmuxSession() {
            const input = document.getElementById('newSessionName');
            const name = input?.value?.trim();

            if (!name) {
                showToast('请输入会话名称', 'warning', 2000);
                return;
            }

            // 验证会话名格式
            const validName = name.replace(/[^a-zA-Z0-9_-]/g, '');
            if (!validName) {
                showToast('会话名只能包含字母、数字、下划线和连字符', 'warning', 3000);
                return;
            }

            // 检查是否已存在
            if (allSessions && allSessions.includes(validName)) {
                showToast('会话名已存在', 'warning', 2000);
                return;
            }

            // 通过 WebSocket 发送创建请求
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'create_session',
                    name: validName
                }));
                showToast('正在创建会话...', 'info', 1500);
            } else {
                showToast('WebSocket 未连接，无法创建会话', 'error', 3000);
            }

            // 清空输入
            if (input) input.value = '';
        }

        // 跳过会话选择
        function skipSessionSelection() {
            // 保持 empty 状态，返回空视图
            showEmptyView();
        }

        // 显示空视图（空白标签页）
        function showEmptyView() {
            const terminalView = document.getElementById('terminalView');
            const snapshotView = document.getElementById('snapshotView');
            const sessionSelector = document.getElementById('sessionSelector');

            if (terminalView) terminalView.style.display = 'none';
            if (snapshotView) snapshotView.style.display = 'none';
            if (sessionSelector) sessionSelector.style.display = 'none';

            console.log('[Tab] 显示空视图');
        }

        // 处理服务器返回的会话创建结果
        function handleSessionCreated(data) {
            if (data.success) {
                showToast('会话创建成功: ' + data.name, 'success', 2000);

                // 自动选择新创建的会话
                if (currentTab) {
                    currentTab.sessionName = data.name;
                    currentTab.status = 'connecting';
                    saveTabsToStorage();
                    renderTabList();
                    updateTabUI();
                    connectTabSession();
                }

                // 刷新会话列表
                refreshSessions();
            } else {
                showToast('会话创建失败: ' + (data.error || '未知错误'), 'error', 3000);
            }
        }

        // 更新标签页相关的UI
        function updateTabUI() {
            if (!currentTab) return;

            // 更新标题栏会话指示器
            const sessionIndicator = document.getElementById('sessionIndicator');
            if (sessionIndicator) {
                sessionIndicator.textContent = currentTab.sessionName || currentTab.name;
            }

            // 更新侧边栏标题
            const sidebarTitle = document.querySelector('.sidebar-title');
            if (sidebarTitle) {
                sidebarTitle.textContent = `标签页 (${tabs.length})`;
            }
        }

        // 创建新标签页
        function createNewTab() {
            // 生成标签页名称
            const tabNumber = tabs.length + 1;
            const tabName = `标签页 ${tabNumber}`;

            // 创建新标签页（状态为 empty，未关联会话）
            const newTab = {
                id: generateTabId(),
                name: tabName,
                sessionName: null,
                status: 'empty',
                snapshot: '',
                terminalBuffer: [],
                createdAt: Date.now(),
                lastActivity: Date.now()
            };

            tabs.push(newTab);
            currentTab = newTab;
            saveTabsToStorage();

            // 更新UI
            updateTabUI();
            renderTabList();
            showSessionSelector();

            showToast('标签页已创建: ' + tabName, 'success', 2000);
        }

        // 连接到标签页关联的会话
        function connectTabSession() {
            if (!currentTab || !currentTab.sessionName) return;

            currentTab.status = 'connecting';
            saveTabsToStorage();
            renderTabList();
            updateTabUI();

            // 更新WebSocket URL中的会话参数
            const newUrl = getWebSocketUrl();

            // 如果WebSocket已连接，发送切换命令
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'switch', session: currentTab.sessionName }));
                currentTab.status = 'connected';
                currentTab.lastActivity = Date.now();
                saveTabsToStorage();
                showTerminalView();
                showToast('已连接到会话: ' + currentTab.sessionName, 'success', 2000);
            } else {
                // 如果未连接，触发连接流程
                reconnectAttempts = 0;
                connect();
                // 连接状态将在 ws.onopen 回调中更新
            }
        }

        // 删除当前标签页
        function deleteCurrentTab() {
            if (!currentTab) return;

            if (tabs.length <= 1) {
                showToast('至少保留一个标签页', 'warning', 2000);
                return;
            }

            if (!confirm(`确定要删除标签页 "${currentTab.name}" 吗?`)) {
                return;
            }

            const tabId = currentTab.id;
            const tabName = currentTab.name;

            // 如果是已连接的标签页，先断开
            if (currentTab.status === 'connected' && ws?.readyState === WebSocket.OPEN && currentTab.sessionName) {
                ws.send(JSON.stringify({ type: 'detach', session: currentTab.sessionName }));
            }

            // 从数组中移除
            tabs = tabs.filter(t => t.id !== tabId);

            // 切换到第一个可用标签页
            currentTab = tabs[0];
            saveTabsToStorage();

            // 更新UI
            renderTabList();
            updateTabUI();

            if (currentTab.status === 'connected' || currentTab.status === 'connecting') {
                showTerminalView();
            } else if (currentTab.status === 'empty') {
                showSessionSelector();
            }

            showToast('标签页已删除: ' + tabName, 'success', 2000);
        }

        // 更新连接状态（在WebSocket事件回调中调用）
        function updateConnectionStatus(status, sessionName) {
            // 找到关联此会话的标签页
            const targetTab = sessionName
                ? tabs.find(t => t.sessionName === sessionName)
                : currentTab;

            if (targetTab) {
                // 映射状态
                let tabStatus = status;
                if (status === 'online') tabStatus = 'connected';
                if (status === 'offline') tabStatus = 'disconnected';

                targetTab.status = tabStatus;
                if (status === 'online') {
                    targetTab.lastActivity = Date.now();
                }
                saveTabsToStorage();
                renderTabList();
                updateTabUI();
            }
        }

        // 在页面关闭时捕获快照
        window.addEventListener('beforeunload', () => {
            if (currentTab && currentTab.status === 'connected') {
                captureSnapshot();
                currentTab.status = 'disconnected';
                saveTabsToStorage();
            }
        });

        // 获取WebSocket URL
        function getWebSocketUrl() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.hostname || 'localhost';
            const port = protocol === 'wss:' ? '9864' : '9865';
            // PRD 2.1.2: Token 通过 WebSocket 首条消息传递，不在 URL 中
            // 但 session 参数需要通过 URL 传递，以便服务器知道要连接哪个 tmux 会话
            const session = getPreferredTabSession();
            const wsUrl = `${protocol}//${host}:${port}`;
            // 如果有指定会话，添加到 WebSocket URL
            if (session) {
                return `${wsUrl}?session=${encodeURIComponent(session)}`;
            }
            return wsUrl;
        }

        function getPreferredTabSession() {
            // 优先从URL获取
            const urlParams = new URLSearchParams(window.location.search);
            const urlSession = urlParams.get('session');
            if (urlSession) return urlSession;

            // 从当前标签页获取关联的会话
            if (currentTab && currentTab.sessionName) {
                return currentTab.sessionName;
            }

            // 尝试从旧存储迁移
            const oldSession = localStorage.getItem('tmux_session');
            if (oldSession) {
                localStorage.removeItem('tmux_session');
                return oldSession;
            }

            return DEFAULT_SESSION;
        }

        function updateSessionIndicator(sessionName) {
            const sessionIndicator = document.getElementById('sessionIndicator');
            if (!sessionIndicator) return;
            sessionIndicator.textContent = sessionName || '独立终端';
        }

        function updatePresenceIndicator(onlineCount) {
            const presenceIndicator = document.getElementById('presenceIndicator');
            if (!presenceIndicator) return;

            if (typeof onlineCount === 'number') {
                presenceIndicator.textContent = `👥 ${onlineCount} 在线`;
                presenceIndicator.style.display = 'inline-flex';
            } else {
                presenceIndicator.textContent = '👥 -';
                presenceIndicator.style.display = 'inline-flex';
            }
        }

        function syncSessionState(sessionName, options = {}) {
            if (!sessionName) return;

            const { updateUrl = true } = options;

            // 查找或创建标签页（如果不存在）
            let tab = tabs.find(t => t.sessionName === sessionName);
            if (!tab) {
                tab = {
                    id: generateTabId(),
                    name: sessionName,
                    sessionName: sessionName,
                    status: 'disconnected',
                    snapshot: '',
                    terminalBuffer: [],
                    createdAt: Date.now(),
                    lastActivity: Date.now()
                };
                tabs.push(tab);
                saveTabsToStorage();
            }
            currentTab = tab;

            localStorage.setItem('tmux_session', sessionName);
            updateSessionIndicator(sessionName);

            if (updateUrl) {
                const url = new URL(window.location.href);
                if (url.searchParams.get('session') !== sessionName) {
                    url.searchParams.set('session', sessionName);
                    window.history.replaceState({}, '', url.toString());
                }
            }
        }

        // PRD 2.1.2: 获取 Token（用于 WebSocket 首条消息认证）
        // 优先级：URL参数 > localStorage > 用户提示输入
        function getToken() {
            const urlParams = new URLSearchParams(window.location.search);
            let token = urlParams.get('token');

            // 如果URL中有token，直接使用
            if (token) {
                localStorage.setItem('tmux_token', token);
                console.log('[Token] 已从URL参数获取');
                return token;
            }

            // 检查 localStorage
            token = localStorage.getItem('tmux_token');
            if (token) {
                console.log('[Token] 已从localStorage获取');
                return token;
            }

            // 没有 token，返回空字符串
            return '';
        }

        // 显示 Token 输入界面
        function showTokenInput(errorMessage) {
            // 重置重连状态，防止自动重连
            reconnectAttempts = MAX_RECONNECT_ATTEMPTS;
            isConnecting = false;

            // 清除可能存在的重连定时器
            if (window.reconnectTimer) {
                clearTimeout(window.reconnectTimer);
                window.reconnectTimer = null;
            }

            const loadingEl = document.getElementById('connectLoading');
            const tokenAreaEl = document.getElementById('tokenInputArea');
            const tokenErrorEl = document.getElementById('tokenError');

            if (loadingEl) loadingEl.classList.add('hidden');
            if (tokenAreaEl) tokenAreaEl.classList.remove('hidden');
            if (errorMessage && tokenErrorEl) {
                tokenErrorEl.textContent = errorMessage;
                tokenErrorEl.classList.remove('hidden');
            } else if (tokenErrorEl) {
                tokenErrorEl.classList.add('hidden');
            }

            document.getElementById('connectOverlay').classList.remove('hidden');

            // 聚焦输入框
            setTimeout(() => {
                document.getElementById('tokenInput')?.focus();
            }, 100);
        }

        // 隐藏 Token 输入界面，显示加载中
        function showLoading() {
            const loadingEl = document.getElementById('connectLoading');
            const tokenAreaEl = document.getElementById('tokenInputArea');

            if (loadingEl) loadingEl.classList.remove('hidden');
            if (tokenAreaEl) tokenAreaEl.classList.add('hidden');
        }

        // 处理 Token 提交
        function handleTokenSubmit() {
            const tokenInput = document.getElementById('tokenInput');
            const token = tokenInput?.value?.trim();

            if (!token) {
                document.getElementById('tokenError').textContent = '请输入 Token';
                document.getElementById('tokenError').classList.remove('hidden');
                return;
            }

            // 保存 token
            localStorage.setItem('tmux_token', token);

            // 隐藏错误
            document.getElementById('tokenError').classList.add('hidden');

            // 重置重连计数器，允许新的重连尝试
            reconnectAttempts = 0;

            // 显示加载中并开始连接
            showLoading();
            connect();
        }

        /**
         * 计算指数退避延迟
         * 公式：delay = min(INITIAL_DELAY * (MULTIPLIER ^ (attempts - 1)), MAX_DELAY)
         * 序列：1s → 2s → 4s → 8s → 16s → 30s → 30s → ...
         */
        function calculateExponentialBackoff(attempts) {
            if (attempts <= 1) {
                return INITIAL_RECONNECT_DELAY;
            }
            const delay = INITIAL_RECONNECT_DELAY * Math.pow(RECONNECT_BACKOFF_MULTIPLIER, attempts - 1);
            return Math.min(delay, MAX_RECONNECT_DELAY);
        }

        function connect() {
            if (isConnecting) return;

            // 检查是否有 token
            const currentToken = getToken();
            if (!currentToken) {
                console.log('[Token] 没有可用的token，显示输入界面');
                showTokenInput();
                return;
            }

            isConnecting = true;
            showLoading();

            const wsUrl = getWebSocketUrl();
            console.log('[WebSocket] 尝试连接:', wsUrl);

            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = function() {
                console.log('[WebSocket] 连接成功');
                isConnecting = false;
                reconnectAttempts = 0;

                // PRD 2.1.2: 发送认证消息
                const authMsg = {
                    type: 'auth',
                    token: currentToken,
                    timestamp: Date.now()
                };
                ws.send(JSON.stringify(authMsg));
                console.log('[WebSocket] 已发送认证消息');

                // 更新会话状态为在线
                updateConnectionStatus('online');

                // 显示终端视图（如果从快照视图连接）
                showTerminalView();

                // 显示连接成功提示
                if (currentTab && currentTab.sessionName) {
                    showToast('已连接到会话: ' + currentTab.sessionName, 'success', 2000);
                }
            };

            ws.onclose = function(event) {
                console.log('[WebSocket] 连接关闭:', event.code, event.reason);
                isConnecting = false;

                // 停止心跳
                stopHeartbeat();

                // 捕获当前标签页快照并更新状态为断开
                if (currentTab && currentTab.status === 'connected') {
                    captureSnapshot();
                    updateConnectionStatus('disconnected');
                }

                // 显示离线提示
                showOfflineToast();

                // 更新 UI
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = '已断开';
                document.getElementById('connectOverlay').classList.remove('hidden');

                // 自动重连（指数退避）
                // 如果没有 token，不要自动重连，等待用户输入
                const token = getToken();
                if (!token) {
                    console.log('[Reconnect] 无可用 token，停止自动重连，等待用户输入');
                    showTokenInput();
                    return;
                }

                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    const delay = calculateExponentialBackoff(reconnectAttempts);
                    const delaySeconds = (delay / 1000).toFixed(1);
                    document.querySelector('.connect-text').textContent =
                        `连接断开，${delaySeconds}秒后重连... (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`;
                    console.log(`[Reconnect] ${delaySeconds}s 后重试 (attempt ${reconnectAttempts})`);
                    window.reconnectTimer = setTimeout(connect, delay);
                } else {
                    document.querySelector('.connect-text').textContent =
                        '连接失败，请刷新页面重试';
                    console.error('[Reconnect] 达到最大重连次数，放弃重连');
                }
            };

            ws.onerror = function(error) {
                console.error('[WebSocket] 错误:', error);
                isConnecting = false;
            };
            
            ws.onmessage = function(event) {
                if (event.data instanceof ArrayBuffer) {
                    // 处理到缓冲区用于快照
                    processTerminalOutput(event.data);
                    term.write(new Uint8Array(event.data));
                } else if (typeof event.data === 'string') {
                    try {
                        const data = JSON.parse(event.data);

                        if (data.type === 'auth_result') {
                            // PRD 2.1.2: 认证结果处理
                            if (data.success) {
                                console.log('[Auth] 认证成功');
                                // 隐藏离线提示
                                hideOfflineToast();
                                // 更新 UI
                                document.getElementById('statusDot').className = 'status-dot connected';
                                document.getElementById('statusText').textContent = '已连接';
                                document.getElementById('connectOverlay').classList.add('hidden');
                                // 发送终端大小
                                sendTerminalSize();
                                // 聚焦终端
                                term.focus();
                                // 启动心跳检测
                                startHeartbeat();
                                // 认证成功后立即请求会话列表
                                refreshSessions();
                            } else {
                                console.error('[Auth] 认证失败:', data.message);
                                showToast('认证失败: ' + data.message, 'error', 0);
                                // 清除错误的 token
                                localStorage.removeItem('tmux_token');
                                // 停止重连，避免无效循环
                                reconnectAttempts = MAX_RECONNECT_ATTEMPTS;
                                isConnecting = false;
                                // 关闭现有连接
                                if (ws) {
                                    ws.close();
                                    ws = null;
                                }
                                // 显示 token 输入界面让用户重新输入
                                showTokenInput(data.message || '认证失败，请重新输入 Token');
                            }
                        } else if (data.type === 'init') {
                            term.writeln('\r\n\x1b[32m\x1b[1m[终端已启动]\x1b[0m\r\n');
                            // 记录服务器模式
                            if (data.mode) {
                                serverMode = data.mode;
                                console.log('[Server] 模式:', data.mode);
                                updateModeIndicator(data.mode);
                            }
                            if (data.mode === 'tmux' && data.session) {
                                syncSessionState(data.session);
                                updatePresenceIndicator(
                                    typeof data.online_count === 'number' ? data.online_count : 1
                                );
                                refreshSessions();
                            } else {
                                updateSessionIndicator('独立终端');
                                updatePresenceIndicator(null);
                            }
                            // 检查是否已启用录制
                            if (data.recording === true) {
                                startRecording();
                            }
                        } else if (data.type === 'mode_fallback') {
                            // F-003: 模式降级提示
                            console.log('[Fallback] 从', data.from_mode, '降级到', data.to_mode);
                            showToast(data.message, 'warning', 5000);
                            // 记录降级状态
                            serverMode = data.to_mode;
                            // 更新模式指示器
                            updateModeIndicator(data.to_mode, data.reason);
                        } else if (data.type === 'error') {
                            term.writeln(`\r\n\x1b[31m[错误] ${data.message}\x1b[0m\r\n`);
                            showToast(data.message, 'error', 4000);
                        } else if (data.type === 'auth_error') {
                            showToast(data.message, 'error', 0);
                        } else if (data.type === 'sessions') {
                            // 更新会话列表
                            renderSessionList(data.sessions, data.current);
                            if (serverMode === 'tmux' && data.current) {
                                syncSessionState(data.current);
                            }
                            if (serverMode === 'tmux' && typeof data.online_count === 'number') {
                                updatePresenceIndicator(data.online_count);
                            }
                        } else if (data.type === 'session_created') {
                            // PRD F-004: 会话创建结果
                            handleSessionCreated(data);
                        } else if (data.type === 'switch_request') {
                            // 切换会话请求 - 需要刷新页面重连
                            showToast(data.message || '正在切换会话...', 'info', 2000);
                            syncSessionState(data.session);
                            console.log('[Session] URL已更新为:', data.session);
                            // 延迟刷新页面，让用户看到提示
                            setTimeout(function() {
                                window.location.reload();
                            }, 1500);

                        } else if (data.type === 'session_switched') {
                            showToast('已切换到会话：' + data.session, 'success', 2000);
                            syncSessionState(data.session);
                            refreshSessions();
                        } else if (data.type === 'session_presence') {
                            if (data.session && currentTab && data.session === currentTab.sessionName) {
                                updatePresenceIndicator(data.online_count);
                            }
                        } else if (data.type === 'recording_started') {
                            startRecording();
                        } else if (data.type === 'recording_stopped') {
                            stopRecording();
                        } else if (data.type === 'recordings') {
                            console.log('[Recordings] 列表:', data.recordings);
                        }
                    } catch (e) {
                        term.write(event.data);
                    }
                } else if (event.data === 'pong') {
                    // 心跳响应
                    console.log('[Heartbeat] 收到 pong');
                }
            };
        }

        /**
         * 检测 zmodem 传输开始
         */
        function detectZmodem(data) {
            // 检测 zmodem 起始序列：**B0100000023be503**
            if (data instanceof ArrayBuffer) {
                const bytes = new Uint8Array(data);
                // 检查是否包含 zmodem 起始标记
                for (let i = 0; i < bytes.length - 8; i++) {
                    if (bytes[i] === 0x2a && bytes[i+1] === 0x2a && // **
                        bytes[i+2] === 0x42 &&                      // B
                        bytes[i+3] === 0x30 && bytes[i+4] === 0x31 && // 01
                        bytes[i+5] === 0x30 && bytes[i+6] === 0x30 && // 00
                        bytes[i+7] === 0x30 && bytes[i+8] === 0x30    // 00
                    ) {
                        console.log('[Zmodem] 检测到传输开始');
                        return true;
                    }
                }
            }
            return false;
        }
